<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AIスケジューラー">
<title>AIスケジューラー</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh; background: #0d1117; color: #e2e8f0;
  font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  display: flex; flex-direction: column; align-items: center;
}

/* Login Screen */
#login-screen {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 100vh; width: 100%; padding: 24px;
}
#login-card {
  width: 100%; max-width: 400px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px; padding: 32px 24px; text-align: center;
}
#login-icon {
  width: 56px; height: 56px; border-radius: 16px;
  background: linear-gradient(135deg,#4299e1,#48bb78);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; margin: 0 auto 16px;
}
#login-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
#login-desc { font-size: 13px; color: #718096; line-height: 1.6; margin-bottom: 24px; }
#login-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; background: #fff; border: none; border-radius: 10px;
  padding: 13px; color: #333; font-size: 15px; font-weight: 600;
  cursor: pointer; font-family: inherit;
}
#login-btn img { width: 20px; height: 20px; }

/* App */
#app { display: none; flex-direction: column; align-items: center; width: 100%; min-height: 100vh; }
#header {
  width: 100%; max-width: 660px; padding: 52px 20px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: center; gap: 12px;
  position: sticky; top: 0; background: #0d1117; z-index: 10;
}
#header-icon {
  width: 38px; height: 38px; border-radius: 11px;
  background: linear-gradient(135deg,#4299e1,#48bb78);
  display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
}
#header-info { flex: 1; }
#header-title { font-weight: 700; font-size: 16px; }
#header-date { color: #4a5568; font-size: 11px; margin-top: 2px; }
#logout-btn {
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px; padding: 5px 10px; color: #718096; font-size: 11px;
  cursor: pointer; font-family: inherit;
}

#messages {
  flex: 1; width: 100%; max-width: 660px;
  padding: 14px 16px 8px;
  display: flex; flex-direction: column; gap: 12px;
}
.msg-wrap { display: flex; flex-direction: column; gap: 3px; }
.msg-wrap.user { align-items: flex-end; }
.msg-wrap.assistant { align-items: flex-start; }
.msg-bubble {
  max-width: 86%; padding: 10px 14px; font-size: 14px; line-height: 1.7;
  white-space: pre-wrap; word-break: break-word;
}
.msg-bubble.user {
  border-radius: 16px 16px 4px 16px;
  background: linear-gradient(135deg,#2b6cb0,#276749); color: #fff;
}
.msg-bubble.assistant {
  border-radius: 4px 16px 16px 16px;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); color: #cbd5e0;
}
.msg-time { font-size: 10px; color: #3d4450; }

#proposals-area {
  width: 100%; max-width: 660px; padding: 0 16px 8px;
  display: none; flex-direction: column; gap: 8px;
}
#proposals-label { font-size: 12px; color: #718096; font-weight: 600; }
.proposal-card {
  background: rgba(255,255,255,0.04); border-radius: 12px;
  padding: 12px 14px; display: flex; gap: 12px; align-items: flex-start;
}
.p-title { font-weight: 600; font-size: 14px; }
.p-time { color: #718096; font-size: 12px; margin-top: 3px; }
.p-reason { color: #4a5568; font-size: 11px; margin-top: 2px; }
.p-notify { color: #4a5568; font-size: 11px; margin-top: 2px; }
.type-btn {
  flex-shrink: 0; border-radius: 8px; padding: 6px 12px;
  font-size: 12px; cursor: pointer; font-weight: 700; white-space: nowrap; font-family: inherit;
}
.type-btn.schedule { background: rgba(66,153,225,0.15); color: #4299e1; border: 1px solid rgba(66,153,225,0.4); }
.type-btn.todo { background: rgba(72,187,120,0.15); color: #48bb78; border: 1px solid rgba(72,187,120,0.4); }
#proposal-actions { display: flex; gap: 8px; margin-top: 4px; }
#register-btn {
  flex: 1; background: linear-gradient(135deg,#4299e1,#48bb78);
  border: none; border-radius: 10px; padding: 12px;
  color: #fff; font-weight: 700; font-size: 14px; cursor: pointer; font-family: inherit;
}
#cancel-btn {
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09);
  border-radius: 10px; padding: 12px 16px;
  color: #718096; font-size: 13px; cursor: pointer; font-family: inherit;
}

#loading { display: none; gap: 5px; padding: 4px 16px; align-items: center; width: 100%; max-width: 660px; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: #4299e1; animation: dot 1.2s ease-in-out infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot { 0%,80%,100%{opacity:.2;transform:scale(.7)} 40%{opacity:1;transform:scale(1)} }

#input-area {
  width: 100%; max-width: 660px; padding: 10px 16px 32px;
  border-top: 1px solid rgba(255,255,255,0.06);
  position: sticky; bottom: 0; background: #0d1117;
}
#input-row {
  display: flex; gap: 8px; background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.09); border-radius: 14px; padding: 8px 8px 8px 14px;
}
#input-box {
  flex: 1; background: transparent; border: none; outline: none;
  color: #e2e8f0; font-size: 14px; resize: none; font-family: inherit; line-height: 1.6;
}
#send-btn {
  width: 38px; height: 38px; align-self: flex-end; border-radius: 10px;
  border: none; color: #fff; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  background: linear-gradient(135deg,#4299e1,#48bb78);
}
#send-btn:disabled { background: rgba(255,255,255,0.05); cursor: not-allowed; }
#input-hint { text-align: center; color: #3d4450; font-size: 11px; margin-top: 7px; }
</style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading-screen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;width:100%;gap:16px;">
  <div style="width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#4299e1,#48bb78);display:flex;align-items:center;justify-content:center;font-size:26px;">🗓</div>
  <div style="color:#718096;font-size:13px;">読み込み中...</div>
  <div style="display:flex;gap:5px;margin-top:4px;">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
</div>

<!-- Login Screen -->
<div id="login-screen" style="display:none">
  <div id="login-card">
    <div id="login-icon">🗓</div>
    <div id="login-title">AI スケジューラー</div>
    <div id="login-desc">
      Googleアカウントでログインして<br>カレンダーとタスクに直接登録できます
    </div>
    <input id="apikey-input" type="password" placeholder="Anthropic APIキー (sk-ant-...)" style="width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:12px 14px;color:#e2e8f0;font-size:13px;font-family:monospace;outline:none;margin-bottom:12px;" />
    <button id="login-btn" onclick="signIn()">
      <img src="https://www.google.com/favicon.ico" alt="Google">
      Googleでログイン
    </button>
  </div>
</div>

<!-- Main App -->
<div id="app">
  <div id="header">
    <div id="header-icon">🗓</div>
    <div id="header-info">
      <div id="header-title">AI スケジューラー</div>
      <div id="header-date"></div>
    </div>
    <button id="logout-btn" onclick="signOut()">ログアウト</button>
  </div>
  <div id="messages"></div>
  <div id="proposals-area">
    <div id="proposals-label">📋 提案内容 — ボタンで種別を切り替えできます</div>
    <div id="proposals-list"></div>
    <div id="proposal-actions">
      <button id="register-btn" onclick="register()">Googleに一括登録する</button>
      <button id="cancel-btn" onclick="cancelProposals()">キャンセル</button>
    </div>
  </div>
  <div id="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  <div id="input-area">
    <div id="input-row">
      <textarea id="input-box" rows="2" placeholder="今日の予定を自由に話してください…"></textarea>
      <button id="send-btn" onclick="propose()">↑</button>
    </div>
    <div id="input-hint">送信ボタンまたはEnterで送信</div>
  </div>
</div>

<script>
// ===== 設定 =====
let ANTHROPIC_API_KEY = "";
const GOOGLE_CLIENT_ID = "251646223995-2v53nbr85v5ivj3vmr0ib3l08uvid4ag.apps.googleusercontent.com";
const GOOGLE_SCOPES = "https://www.googleapis.com/auth/calendar https://www.googleapis.com/auth/tasks";

// ===== 日付 (JST) - 毎回最新を取得 =====
const pad = n => String(n).padStart(2,"0");
function getJSTDate() {
  const now = new Date();
  const jst = new Date(now.getTime() + (9*60 + now.getTimezoneOffset()) * 60000);
  const iso = jst.getFullYear()+"-"+pad(jst.getMonth()+1)+"-"+pad(jst.getDate());

  // 今週の月曜〜日曜を計算（月曜始まり）
  const dow = jst.getDay(); // 0=日,1=月,...,6=土
  const diffToMon = (dow === 0) ? -6 : 1 - dow; // 日曜なら-6、それ以外は1-dow
  const mon = new Date(jst); mon.setDate(jst.getDate() + diffToMon);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  const weekStart = mon.getFullYear()+"-"+pad(mon.getMonth()+1)+"-"+pad(mon.getDate());
  const weekEnd   = sun.getFullYear()+"-"+pad(sun.getMonth()+1)+"-"+pad(sun.getDate());

  return {
    iso,
    label: jst.toLocaleDateString("ja-JP",{year:"numeric",month:"long",day:"numeric",weekday:"long"}),
    weekStart,
    weekEnd,
  };
}

let accessToken = "";
let tokenExpiresAt = 0;
let proposals = [];
let tokenClient;
// 予定変更フロー管理
// { step: "selecting"|"editing"|"confirming", event: {...}, changes: {...} }
let editState = null;

// ===== Google OAuth =====
window.onload = () => {
  try {
    const savedKey = localStorage.getItem("anthropic_key");
    if (savedKey) document.getElementById("apikey-input").value = savedKey;
  } catch(e) {}

  // GSIライブラリ読み込み待ち（最大10秒でタイムアウト）
  let waited = 0;
  const waitForGSI = setInterval(() => {
    waited += 100;
    if (window.google?.accounts?.oauth2) {
      clearInterval(waitForGSI);
      initGoogleAuth();
    } else if (waited >= 10000) {
      clearInterval(waitForGSI);
      document.getElementById("loading-screen").style.display = "none";
      document.getElementById("login-screen").style.display = "flex";
      alert("Googleの認証ライブラリの読み込みに失敗しました。ネットワークを確認してください。");
    }
  }, 100);
};

function initGoogleAuth() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: GOOGLE_SCOPES,
    // callbackは用途ごとに設定する（サイレント認証 or 手動ログイン）
    callback: (resp) => {
      if (resp.error) {
        document.getElementById("login-screen").style.display = "flex";
        return;
      }
      accessToken = resp.access_token;
      tokenExpiresAt = Date.now() + (resp.expires_in - 120) * 1000;
      try { localStorage.setItem("google_logged_in", "true"); } catch(e) {}
      showApp();
    },
  });

  // 以前ログイン済みでAPIキーも保存済みなら自動サイレント認証
  try {
    const loggedIn = localStorage.getItem("google_logged_in");
    const savedKey = localStorage.getItem("anthropic_key");
    if (loggedIn && savedKey) {
      ANTHROPIC_API_KEY = savedKey;
      // コールバックが呼ばれなかった場合のフォールバック（5秒）
      const silentTimeout = setTimeout(() => {
        if (!accessToken) {
          document.getElementById("loading-screen").style.display = "none";
          document.getElementById("login-screen").style.display = "flex";
        }
      }, 5000);
      tokenClient.callback = (resp) => {
        clearTimeout(silentTimeout);
        document.getElementById("loading-screen").style.display = "none";
        if (resp.error) {
          document.getElementById("login-screen").style.display = "flex";
          return;
        }
        accessToken = resp.access_token;
        tokenExpiresAt = Date.now() + (resp.expires_in - 120) * 1000;
        try { localStorage.setItem("google_logged_in", "true"); } catch(e) {}
        showApp();
      };
      tokenClient.requestAccessToken({ prompt: "" });
      return;
    }
  } catch(e) {}

  // 未ログインならログイン画面を表示
  document.getElementById("loading-screen").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
}

// アクセストークンが期限切れなら自動更新
async function ensureToken() {
  if (Date.now() < tokenExpiresAt) return; // まだ有効
  return new Promise((resolve, reject) => {
    // callbackを一時的に差し替え、完了後に元のcallbackを復元する
    const originalCallback = tokenClient.callback;
    tokenClient.callback = (resp) => {
      tokenClient.callback = originalCallback; // 必ず元に戻す
      if (resp.error) { reject(new Error("再認証失敗: " + resp.error)); return; }
      accessToken = resp.access_token;
      tokenExpiresAt = Date.now() + (resp.expires_in - 120) * 1000;
      resolve();
    };
    tokenClient.requestAccessToken({ prompt: "" });
  });
}

function signIn() {
  const key = document.getElementById("apikey-input").value.trim();
  if (!key.startsWith("sk-")) { alert("AnthropicのAPIキーを入力してください（sk- から始まるもの）"); return; }
  ANTHROPIC_API_KEY = key;
  try { localStorage.setItem("anthropic_key", key); } catch(e) {}
  if (!tokenClient) { alert("Google認証の読み込み中です。少し待ってから再度お試しください。"); return; }
  // 初回のみconsentを表示、以後はselectで省略
  tokenClient.requestAccessToken({ prompt: "select_account" });
}

function signOut() {
  if (accessToken) google.accounts.oauth2.revoke(accessToken);
  accessToken = "";
  tokenExpiresAt = 0;
  try {
    localStorage.removeItem("google_logged_in");
    // APIキーはあえて残す（再ログイン時に入力不要にするため）
  } catch(e) {}
  document.getElementById("app").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
}

function showApp() {
  const { label } = getJSTDate();
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app").style.display = "flex";
  document.getElementById("header-date").textContent = label;
  if (document.getElementById("messages").children.length === 0) {
    addMsg("今日の予定を自由に話しかけてください！\n\n📅 時間が決まっているもの → Googleカレンダーに登録（10分前通知）\n✅ タスク・やること → Googleタスクに登録\n\n例：「朝散歩に行って食洗機の確認をします。16時半から買い物に行きます」", "assistant");
  }
  document.getElementById("input-box").focus();
}

// ===== UI helpers =====
function formatTime() { return new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"}); }

function addMsg(content, role) {
  const wrap = document.createElement("div");
  wrap.className = "msg-wrap " + role;
  const bubble = document.createElement("div");
  bubble.className = "msg-bubble " + role;
  bubble.textContent = content;
  const time = document.createElement("div");
  time.className = "msg-time";
  time.textContent = formatTime();
  wrap.appendChild(bubble);
  wrap.appendChild(time);
  document.getElementById("messages").appendChild(wrap);
  wrap.scrollIntoView({behavior:"smooth"});
  return bubble;
}

function setLoading(on) {
  document.getElementById("loading").style.display = on ? "flex" : "none";
  document.getElementById("send-btn").disabled = on;
}

// ===== Anthropic API =====
async function callClaude(system, userMsg) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": ANTHROPIC_API_KEY,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1200,
      system,
      messages: [{ role: "user", content: userMsg }],
    }),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
}

async function propose() {
  const text = document.getElementById("input-box").value.trim();
  if (!text) return;
  document.getElementById("input-box").value = "";
  addMsg(text, "user");
  setLoading(true);
  let intent = "add"; // tryの外で宣言してcatchからも参照できるようにする
  try {
    const { iso, label } = getJSTDate();

    if (editState?.step === "editing") {
      // 変更内容を受け取るフェーズ中は意図判定をスキップして直接処理
      intent = "edit";
      await handleEditDetails(text, iso);
    } else {
    // まず意図を判定（予定追加 or 閲覧 or 変更）
    const intentSys = "あなたはスケジュール管理アプリのアシスタントです。ユーザーのメッセージの意図を判定してください。" +
      "予定の閲覧・確認なら <intent>view</intent>、" +
      "予定の新規登録なら <intent>add</intent>、" +
      "既存の予定の変更・修正・更新なら <intent>edit</intent> とだけ答えてください。" +
      "今日の日付(JST): " + label + " (" + iso + ")";
    const intentRaw = await callClaude(intentSys, text);
    const intentMatch = intentRaw.match(/<intent>(.*?)<\/intent>/);
    intent = intentMatch ? intentMatch[1].trim() : "add";

    if (intent === "view") {
      await handleView(text, iso, label);
    } else if (intent === "edit") {
      await handleEdit(text, iso, label);
    } else {
      await handleAdd(text, iso, label);
    }
    } // end of intent detection else block
  } catch(e) {
    await showError(e.message, intent === "view" ? "view" : intent === "edit" ? "edit" : "propose");
  } finally {
    setLoading(false);
  }
}

// ===== 予定の閲覧 =====
async function handleView(text, iso, label) {
  // AIに期間を判定させる
  const { weekStart, weekEnd } = getJSTDate();
  const rangeSys = "今日の日付(JST): " + label + " (" + iso + ") " +
    "週は月曜始まりです。今週は " + weekStart + "（月）〜" + weekEnd + "（日）です。" +
    "ユーザーが見たい期間を判定し、<range>開始ISO日付,終了ISO日付</range> の形式で答えてください。" +
    "例: 今日なら <range>" + iso + "," + iso + "</range>、" +
    "今週なら <range>" + weekStart + "," + weekEnd + "</range>、今月なら月初〜月末のISO日付。" +
    "「3月」のような月指定は該当月の1日〜末日。";
  const rangeRaw = await callClaude(rangeSys, text);
  const rangeMatch = rangeRaw.match(/<range>(.*?),(.*?)<\/range>/);
  if (!rangeMatch) { addMsg("期間を正しく判定できませんでした。「今日の予定を見せて」のように話しかけてみてください。", "assistant"); return; }

  const startDate = rangeMatch[1].trim();
  const endDate = rangeMatch[2].trim();

  // Google Calendar APIで取得
  await ensureToken();
  const params = new URLSearchParams({
    timeMin: startDate + "T00:00:00+09:00",
    timeMax: endDate + "T23:59:59+09:00",
    singleEvents: "true",
    orderBy: "startTime",
    maxResults: "50",
  });
  const res = await fetch("https://www.googleapis.com/calendar/v3/calendars/primary/events?" + params, {
    headers: { "Authorization": "Bearer " + accessToken },
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error("カレンダー取得失敗: " + (err.error?.message || res.status));
  }
  const data = await res.json();
  const events = data.items || [];

  // Google Tasks APIで取得（期限が期間内のもの）
  const taskListId = await getDefaultTaskList();
  const taskRes = await fetch(
    "https://tasks.googleapis.com/tasks/v1/lists/" + taskListId + "/tasks?maxResults=100&showCompleted=false",
    { headers: { "Authorization": "Bearer " + accessToken } }
  );
  let tasks = [];
  if (taskRes.ok) {
    const taskData = await taskRes.json();
    const start = new Date(startDate + "T00:00:00+09:00");
    const end = new Date(endDate + "T23:59:59+09:00");
    tasks = (taskData.items || []).filter(t => {
      if (!t.title) return false;
      if (!t.due) return true; // 期限未設定タスクも含める
      const due = new Date(t.due);
      return due >= start && due <= end;
    });
  }

  if (events.length === 0 && tasks.length === 0) {
    addMsg("📅 この期間には予定・タスクが見つかりませんでした。", "assistant");
    return;
  }

  // AIに整形させる
  const formatSys = "あなたはスケジュール管理アシスタントです。カレンダー予定とタスク一覧を見やすい日本語でまとめてください。予定とタスクをセクション分けして、日付・時間・タイトル・メモ（あれば）を整理して表示してください。";

  const eventsText = events.map(e => {
    const start = e.start?.dateTime || e.start?.date || "";
    const startLabel = start.includes("T")
      ? new Date(start).toLocaleString("ja-JP", {month:"numeric",day:"numeric",weekday:"short",hour:"2-digit",minute:"2-digit"})
      : new Date(start + "T00:00:00+09:00").toLocaleDateString("ja-JP", {month:"numeric",day:"numeric",weekday:"short"});
    return "📅 " + startLabel + " 「" + e.summary + "」" + (e.description ? " メモ: " + e.description : "");
  }).join("\n");

  const tasksText = tasks.map(t => {
    const dueLabel = t.due
      ? new Date(t.due).toLocaleDateString("ja-JP", {month:"numeric",day:"numeric",weekday:"short"})
      : "期限なし";
    return "✅ " + dueLabel + " 「" + t.title + "」" + (t.notes ? " メモ: " + t.notes : "");
  }).join("\n");

  const combined = [
    events.length > 0 ? "【カレンダー予定】\n" + eventsText : "",
    tasks.length > 0 ? "【タスク】\n" + tasksText : "",
  ].filter(Boolean).join("\n\n");

  const summary = await callClaude(formatSys, "以下の一覧を整形してください:\n" + combined);
  addMsg(summary, "assistant");
}

// ===== 予定の新規登録 =====
async function handleAdd(text, iso, label) {

    'JSON形式: {"proposals":[{"id":1,"title":"タイトル","suggestedTime":"07:00~07:30","startISO":"' + iso + 'T07:00:00","endISO":"' + iso + 'T07:30:00","type":"schedule","reason":"理由","reminderMinutes":10,"description":""}]}',
    "typeはschedule(時刻が決まっているもの)またはtodo(タスク的・時刻不明)。時間不明なら朝から順に推測。",

    "最後に「内容を確認して登録ボタンを押してください」と案内してください。"
  ].join(" ");

  const fullText = await callClaude(PROPOSE_SYS, text);

  if (parsed?.proposals?.length) { proposals = parsed.proposals; renderProposals(); }

}

  proposals = proposals.map(p => p.id===id ? {...p, type: p.type==="schedule"?"todo":"schedule"} : p);

}

function deleteProposal(id) {
  proposals = proposals.filter(p => p.id !== id);
  if (proposals.length === 0) {
    document.getElementById("proposals-area").style.display = "none";
  } else {
    renderProposals();
  }
}

function updateDescription(id, value) {
  proposals = proposals.map(p => p.id === id ? {...p, description: value} : p);
}

function cancelProposals() {
  proposals = [];
  document.getElementById("proposals-area").style.display = "none";
}

// ===== 予定の変更 =====
async function handleEdit(text, iso, label) {
  // AIに検索キーワードと期間を判定させる
  const { weekStart: ws, weekEnd: we } = getJSTDate();
  const searchSys = "今日の日付(JST): " + label + " (" + iso + ") " +
    "週は月曜始まりです。今週は " + ws + "（月）〜" + we + "（日）です。" +
    "ユーザーが変更したい予定を特定するため、検索に使うキーワードと期間を判定してください。" +
    "<keyword>イベント名や関連語</keyword><range>開始ISO日付,終了ISO日付</range> の形式で答えてください。" +
    "期間が不明なら今日から2週間後までを使ってください。";
  const searchRaw = await callClaude(searchSys, text);
  const kwMatch = searchRaw.match(/<keyword>(.*?)<\/keyword>/);
  const rangeMatch = searchRaw.match(/<range>(.*?),(.*?)<\/range>/);

  const keyword = kwMatch ? kwMatch[1].trim() : "";
  const startDate = rangeMatch ? rangeMatch[1].trim() : iso;
  const endDate = rangeMatch ? rangeMatch[2].trim() : (() => {
    const d = new Date(iso); d.setDate(d.getDate() + 14);
    return d.toISOString().slice(0,10);
  })();

  await ensureToken();

  // カレンダーイベントを検索
  const calParams = new URLSearchParams({
    timeMin: startDate + "T00:00:00+09:00",
    timeMax: endDate + "T23:59:59+09:00",
    singleEvents: "true",
    orderBy: "startTime",
    maxResults: "20",
    q: keyword,
  });
  const calRes = await fetch("https://www.googleapis.com/calendar/v3/calendars/primary/events?" + calParams, {
    headers: { "Authorization": "Bearer " + accessToken },
  });
  if (!calRes.ok) {
    const err = await calRes.json();
    throw new Error("カレンダー取得失敗: " + (err.error?.message || calRes.status));
  }
  const calData = await calRes.json();
  const calEvents = (calData.items || []).filter(e => e.summary).map(e => ({...e, _type: "calendar"}));

  // タスクを検索
  const taskListId = await getDefaultTaskList();
  const taskRes = await fetch(
    "https://tasks.googleapis.com/tasks/v1/lists/" + taskListId + "/tasks?maxResults=100&showCompleted=false",
    { headers: { "Authorization": "Bearer " + accessToken } }
  );
  let taskItems = [];
  if (taskRes.ok) {
    const taskData = await taskRes.json();
    const kw = keyword.toLowerCase();
    taskItems = (taskData.items || [])
      .filter(t => t.title && (!kw || t.title.toLowerCase().includes(kw)))
      .map(t => ({...t, _type: "task"}));
  }

  const allItems = [...calEvents, ...taskItems];

  if (allItems.length === 0) {
    addMsg("該当する予定・タスクが見つかりませんでした。期間やキーワードを変えて再度お試しください。", "assistant");
    return;
  }

  addMsg("変更したい予定・タスクを選んでください：", "assistant");
  renderEditCandidates(allItems);
}

async function handleEditDetails(text, iso) {
  const ev = editState.event;
  const isTask = ev._type === "task";

  let editSys, hint;
  if (isTask) {
    editSys = "あなたはスケジュール管理アシスタントです。今日の日付(JST): " + iso + " " +
      "以下の既存タスクに対してユーザーが求める変更を解析し、<changes>...</changes>タグでJSONを返してください。" +
      "変更がないフィールドは含めないでください。" +
      'JSON形式: {"title":"新タイトル","dueDate":"2025-01-01","notes":"新メモ"}' +
      "既存タスク: タイトル=\"" + ev.title + "\", 期限=\"" + (ev.due||"") + "\", メモ=\"" + (ev.notes||"") + "\"";
    hint = "例：「タイトルを〇〇に変更」「期限を明日に変更」";
  } else {
    const start = ev.start?.dateTime || ev.start?.date || "";
    const end = ev.end?.dateTime || ev.end?.date || "";
    // 元の所要時間を計算（分）
    const durationMin = (start && end && start.includes("T") && end.includes("T"))
      ? Math.round((new Date(end) - new Date(start)) / 60000)
      : 60;
    editSys = "あなたはスケジュール管理アシスタントです。今日の日付(JST): " + iso + " " +
      "以下の既存イベントに対してユーザーが求める変更を解析し、<changes>...</changes>タグでJSONを返してください。" +
      "変更がないフィールドは含めないでください。" +
      "【重要】開始時刻のみ変更する場合は、元の所要時間（" + durationMin + "分）を維持してendISOも必ず設定してください。" +
      'JSON形式: {"title":"新タイトル","startISO":"2025-01-01T10:00:00","endISO":"2025-01-01T11:00:00","description":"新メモ","reminderMinutes":10}' +
      "既存イベント: タイトル=\"" + ev.summary + "\", 開始=\"" + start + "\", 終了=\"" + end + "\", メモ=\"" + (ev.description||"") + "\"";
    hint = "例：「16時に変更」「タイトルを〇〇に変更」";
  }

  const raw = await callClaude(editSys, text);
  const match = raw.match(/<changes>([\s\S]*?)<\/changes>/);
  if (!match) {
    addMsg("変更内容を正しく解析できませんでした。もう一度教えてください。\n" + hint, "assistant");
    return;
  }

  const changes = JSON.parse(match[1]);
  editState = { ...editState, step: "confirming", changes };
  renderEditConfirm(ev, changes);
}

function renderEditConfirm(ev, changes) {
  document.getElementById("edit-confirm")?.remove();

  const area = document.createElement("div");
  area.id = "edit-confirm";
  area.style.cssText = "width:100%;max-width:660px;padding:0 16px 8px;display:flex;flex-direction:column;gap:8px;";

  const isTask = ev._type === "task";
  const lines = ["以下の内容に変更します：\n"];
  if (changes.title) lines.push("📌 タイトル: " + changes.title);
  if (isTask) {
    if (changes.dueDate) lines.push("📅 期限: " + new Date(changes.dueDate + "T00:00:00+09:00").toLocaleDateString("ja-JP", {month:"numeric",day:"numeric",weekday:"short"}));
    if (changes.notes !== undefined) lines.push("📝 メモ: " + (changes.notes || "（削除）"));
  } else {
    if (changes.startISO) lines.push("🕐 開始: " + new Date(changes.startISO + "+09:00").toLocaleString("ja-JP", {month:"numeric",day:"numeric",weekday:"short",hour:"2-digit",minute:"2-digit"}));
    if (changes.endISO) lines.push("🕐 終了: " + new Date(changes.endISO + "+09:00").toLocaleString("ja-JP", {month:"numeric",day:"numeric",weekday:"short",hour:"2-digit",minute:"2-digit"}));
    if (changes.description !== undefined) lines.push("📝 メモ: " + (changes.description || "（削除）"));
    if (changes.reminderMinutes) lines.push("🔔 通知: " + (changes.reminderMinutes >= 60 ? changes.reminderMinutes/60 + "時間前" : changes.reminderMinutes + "分前"));
  }

  addMsg(lines.join("\n"), "assistant");

  const btnRow = document.createElement("div");
  btnRow.style.cssText = "display:flex;gap:8px;";

  const confirmBtn = document.createElement("button");
  confirmBtn.textContent = "変更する";
  confirmBtn.style.cssText = "flex:1;background:linear-gradient(135deg,#4299e1,#48bb78);border:none;border-radius:10px;padding:12px;color:#fff;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;";
  confirmBtn.onclick = () => applyEdit(ev, changes, area);

  const cancelBtn = document.createElement("button");
  cancelBtn.textContent = "キャンセル";
  cancelBtn.style.cssText = "background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:10px;padding:12px 16px;color:#718096;font-size:13px;cursor:pointer;font-family:inherit;";
  cancelBtn.onclick = () => { editState = null; area.remove(); };

  btnRow.appendChild(confirmBtn);
  btnRow.appendChild(cancelBtn);
  area.appendChild(btnRow);

  document.getElementById("messages").after(area);
  area.scrollIntoView({behavior:"smooth"});
}

async function applyEdit(ev, changes, areaEl) {
  areaEl.remove();
  editState = null;
  setLoading(true);
  const bubble = addMsg("変更中...", "assistant");

  try {
    await ensureToken();
    const isTask = ev._type === "task";

    if (isTask) {
      // タスクの変更
      const taskListId = await getDefaultTaskList();
      const getRes = await fetch("https://tasks.googleapis.com/tasks/v1/lists/" + taskListId + "/tasks/" + ev.id, {
        headers: { "Authorization": "Bearer " + accessToken },
      });
      if (!getRes.ok) {
        const err = await getRes.json();
        throw new Error("タスク取得失敗: " + (err.error?.message || getRes.status));
      }
      const existing = await getRes.json();
      const body = { ...existing };
      if (changes.title) body.title = changes.title;
      if (changes.notes !== undefined) body.notes = changes.notes;
      if (changes.dueDate) body.due = changes.dueDate + "T00:00:00Z";

      const res = await fetch("https://tasks.googleapis.com/tasks/v1/lists/" + taskListId + "/tasks/" + ev.id, {
        method: "PUT",
        headers: { "Authorization": "Bearer " + accessToken, "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error("タスク変更失敗: " + (err.error?.message || res.status));
      }
    } else {
      // カレンダーイベントの変更
      const getRes = await fetch("https://www.googleapis.com/calendar/v3/calendars/primary/events/" + ev.id, {
        headers: { "Authorization": "Bearer " + accessToken },
      });
      if (!getRes.ok) {
        const err = await getRes.json();
        throw new Error("イベント取得失敗: " + (err.error?.message || getRes.status));
      }
      const existing = await getRes.json();
      const body = { ...existing };
      if (changes.title) body.summary = changes.title;
      if (changes.description !== undefined) body.description = changes.description;
      if (changes.startISO) body.start = { dateTime: changes.startISO + "+09:00", timeZone: "Asia/Tokyo" };
      if (changes.endISO) body.end = { dateTime: changes.endISO + "+09:00", timeZone: "Asia/Tokyo" };
      if (changes.reminderMinutes) {
        body.reminders = { useDefault: false, overrides: [{ method: "popup", minutes: changes.reminderMinutes }] };
      }

      const res = await fetch("https://www.googleapis.com/calendar/v3/calendars/primary/events/" + ev.id, {
        method: "PUT",
        headers: { "Authorization": "Bearer " + accessToken, "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error("変更失敗: " + (err.error?.message || res.status));
      }
    }

    bubble.textContent = "✅ " + (ev._type === "task" ? "タスク" : "予定") + "を変更しました！";
  } catch(e) {
    bubble.remove();
    await showError(e.message, "edit");
  } finally {
    setLoading(false);
  }
}

// ===== Google Calendar API =====
async function createCalendarEvent(p) {
  await ensureToken();
  const body = {
    summary: p.title,
    description: p.description || "",
    start: { dateTime: p.startISO + "+09:00", timeZone: "Asia/Tokyo" },
    end:   { dateTime: p.endISO   + "+09:00", timeZone: "Asia/Tokyo" },
    reminders: {
      useDefault: false,
      overrides: [{ method: "popup", minutes: p.reminderMinutes || 10 }],
    },
  };
  const res = await fetch("https://www.googleapis.com/calendar/v3/calendars/primary/events", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + accessToken,
      "Content-Type": "application/json",
    },
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error("カレンダー登録失敗: " + (err.error?.message || res.status));
  }
  return await res.json();
}

// ===== Google Tasks API =====
async function getDefaultTaskList() {
  await ensureToken();
  const res = await fetch("https://tasks.googleapis.com/tasks/v1/users/@me/lists", {
    headers: { "Authorization": "Bearer " + accessToken },
  });
  const data = await res.json();
  return data.items?.[0]?.id || "@default";
}

// listIdを外から受け取ることで複数タスク登録時のAPI呼び出しを節約
async function createTaskWithList(p, listId) {
  await ensureToken();
  const dueDate = p.startISO ? p.startISO.slice(0, 10) : getJSTDate().iso;
  const body = {
    title: p.title,
    notes: p.description || "",
    due: dueDate + "T00:00:00Z",
  };
  const res = await fetch("https://tasks.googleapis.com/tasks/v1/lists/" + listId + "/tasks", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + accessToken,
      "Content-Type": "application/json",
    },
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error("タスク登録失敗: " + (err.error?.message || res.status));
  }
  return await res.json();
}

// ===== エラー表示 + AI分析 =====
async function showError(errorMsg, context) {
  const contextLabel = context === "propose" ? "提案リクエスト" : context === "view" ? "スケジュール閲覧" : context === "edit" ? "予定の変更" : "Google登録";
  const bubble = addMsg(
    "❌ エラーが発生しました\n\n" +
    "【エラー内容】\n" + errorMsg + "\n\n" +
    "考えられる原因を分析中...",
    "assistant"
  );

  try {
    const analysis = await callClaude(
      "あなたはWebアプリのエラー診断アシスタントです。日本語で簡潔に答えてください。",
      "AIスケジューラーアプリの「" + contextLabel + "」処理でエラーが発生しました。\n" +
      "エラー内容: " + errorMsg + "\n\n" +
      "考えられる原因を1〜3個、箇条書きで簡潔に教えてください。また対処法があれば一言添えてください。"
    );
    bubble.textContent =
      "❌ エラーが発生しました\n\n" +
      "【エラー内容】\n" + errorMsg + "\n\n" +
      "【考えられる原因】\n" + analysis;
  } catch(e2) {
    // AI分析自体が失敗した場合はエラー内容だけ表示
    bubble.textContent =
      "❌ エラーが発生しました\n\n" +
      "【エラー内容】\n" + errorMsg;
  }
}

// ===== Register all =====
async function register() {
  if (!proposals.length) return;
  document.getElementById("proposals-area").style.display = "none";
  setLoading(true);
  const bubble = addMsg("Googleに登録中...", "assistant");

  const results = [];
  const errors = [];

  try {
    // TODOが複数ある場合もタスクリストIDを1回だけ取得
    const hasTodos = proposals.some(p => p.type === "todo");
    const taskListId = hasTodos ? await getDefaultTaskList() : null;

    for (const p of proposals) {
      try {
        if (p.type === "schedule") {
          await createCalendarEvent(p);
          results.push("📅 " + p.title + "（" + (p.suggestedTime||"") + "）をカレンダーに登録");
        } else {
          await createTaskWithList(p, taskListId);
          results.push("✅ " + p.title + " をGoogleタスクに追加");
        }
      } catch(e) {
        errors.push("⚠️ " + p.title + ": " + e.message);
      }
    }

    const msg = results.join("\n") + (errors.length ? "\n\n" + errors.join("\n") : "") + "\n\n登録完了しました！";
    bubble.textContent = msg;
    proposals = [];
    bubble.scrollIntoView({behavior:"smooth"});
  } catch(e) {
    // bubble は「登録中...」のまま削除し、showError に一本化
    bubble.remove();
    proposals = [];
    await showError(e.message, "register");
  } finally {
    setLoading(false);
  }
}

document.getElementById("input-box").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); propose(); }
});
